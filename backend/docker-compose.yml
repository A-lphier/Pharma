version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: fatturamvp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fatturamvp
      POSTGRES_PASSWORD: fatturamvp_secret_2024
      POSTGRES_DB: fatturamvp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatturamvp -d fatturamvp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache/Message Broker
  redis:
    image: redis:7-alpine
    container_name: fatturamvp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatturamvp_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fatturamvp:fatturamvp_secret_2024@postgres:5432/fatturamvp
      DATABASE_URL_SYNC: postgresql+psycopg2://fatturamvp:fatturamvp_secret_2024@postgres:5432/fatturamvp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data/invoices:/app/data/invoices
      - ./data/uploads:/app/data/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatturamvp_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fatturamvp:fatturamvp_secret_2024@postgres:5432/fatturamvp
      DATABASE_URL_SYNC: postgresql+psycopg2://fatturamvp:fatturamvp_secret_2024@postgres:5432/fatturamvp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data/invoices:/app/data/invoices
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fatturamvp_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fatturamvp:fatturamvp_secret_2024@postgres:5432/fatturamvp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./celerybeat-schedule:/app/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
