# Configurazione per log query lente (slow query log)
# Questo file viene incluso nel comando di avvio di PostgreSQL

# Log delle query che superano questa soglia (millisecondi)
# 100ms = 0.1 secondi
log_min_duration_statement = 100

# Log query con durata superiore a log_min_duration_statement
log_statement = 'none'
log_duration = off
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off

# Abilita logging query lente con durata
log_min_duration_sample = -1  # Disabilitato per default

# Abilita log per sample (10% delle query tra 100ms e 1s)
# log_min_duration_sample = 100

# File di log per le query lente
# log_directory = 'log'
# log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
# log_rotation_age = 1d
# log_rotation_size = 100MB
