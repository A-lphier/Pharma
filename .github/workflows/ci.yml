# ╔══════════════════════════════════════════════════════════════╗
# ║  FatturaMVP - CI/CD Pipeline                                ║
# ║  GitHub Actions - Push workflow                             ║
# ║  Steps: install, lint, test, build                          ║
# ╚══════════════════════════════════════════════════════════════╝

name: CI FatturaMVP

on:
  push:
    branches:
      - main
      - develop
      - '**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ╔══════════════════════════════════════════════════════════╗
  # ║  Backend - Lint, Test, Build                             ║
  # ╚══════════════════════════════════════════════════════════╝
  backend:
    name: Backend (Python ${{ env.PYTHON_VERSION }})
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fattura_test
          POSTGRES_USER: fattura
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements*.txt

      - name: Installa dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-ita

      - name: Installa dipendenze Python
        working-directory: ./backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Lint Backend (Black + Ruff)
        working-directory: ./backend
        run: |
          source venv/bin/activate
          pip install black ruff
          black --check --diff . || true
          ruff check . || true

      - name: Type check (mypy)
        working-directory: ./backend
        run: |
          source venv/bin/activate
          pip install mypy
          mypy app/ --ignore-missing-imports || true

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://fattura:test@localhost:5432/fattura_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key_ci
          TELEGRAM_BOT_TOKEN: ""
          OPENAPI_SDI_KEY: ""
          BREVO_API_KEY: ""
          STRIPE_API_KEY: ""
        run: |
          source venv/bin/activate
          pip install pytest pytest-asyncio pytest-cov
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html

      - name: Build Docker image backend
        run: |
          docker build ./backend -t fattura-backend:test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/htmlcov/
          retention-days: 7

  # ╔══════════════════════════════════════════════════════════╗
  # ║  Frontend - Lint, Test, Build                            ║
  # ╚══════════════════════════════════════════════════════════╝
  frontend:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend (ESLint)
        working-directory: ./frontend
        run: |
          npm run lint || true

      - name: Type check (TypeScript)
        working-directory: ./frontend
        run: |
          npx tsc --noEmit || true

      - name: Test Frontend
        working-directory: ./frontend
        run: |
          npm run test -- --watchAll=false --passWithNoTests || true

      - name: Build Frontend
        working-directory: ./frontend
        env:
          NODE_ENV: production
          VITE_API_URL: http://localhost:8000
        run: |
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-frontend
          path: frontend/dist/
          retention-days: 7

  # ╔══════════════════════════════════════════════════════════╗
  # ║  Docker Compose - Verifica configurazione               ║
  # ╚══════════════════════════════════════════════════════════╝
  docker:
    name: Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config --quiet || exit 1

      - name: Build tutte le immagini
        run: |
          docker compose build --parallel

      - name: Verifica immagini buildate
        run: |
          docker images | grep -E "fattura" || echo "Nessuna immagine trovata"

  # ╔══════════════════════════════════════════════════════════╗
  # ║  Security Scan                                          ║
  # ╚══════════════════════════════════════════════════════════╝
  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Python dependency check
        working-directory: ./backend
        run: |
          pip install pip-audit || true
          pip-audit || true

      - name: Node dependency check
        working-directory: ./frontend
        run: |
          npm audit --audit-level=moderate || true

  # ╔══════════════════════════════════════════════════════════╗
  # ║  Summary                                                 ║
  # ╚══════════════════════════════════════════════════════════╝
  ci-success:
    name: CI Completata
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, security]
    if: always()
    
    steps:
      - name: Check if all jobs succeeded
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]]; then
            echo "Backend fallito"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" != "success" ]]; then
            echo "Frontend fallito"
            exit 1
          fi
          echo "Tutti i job sono passati!"
