# docker-compose.yaml - FatturaMVP Production Stack
# Stack completa: Backend FastAPI + Frontend React + PostgreSQL 16 + Redis 7 + Celery + Flower + Nginx

version: '3.8'

services:
  # ============================================
  # PostgreSQL 16 con partizionamento annuale
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: fatturamvp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fatturamvp
      POSTGRES_USER: ${POSTGRES_USER:-fatturamvp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/slow_query_log.conf:/etc/postgresql/slow_query_log.conf:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fatturamvp} -d fatturamvp"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ============================================
  # Redis 7 per cache e code
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: fatturamvp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_production} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # Backend FastAPI + Uvicorn
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatturamvp_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app:ro
      - uploads_data:/app/data/uploads
      - invoices_data:/app/data/invoices
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --proxy-headers
      -- forwarded-allow-ips='*'

  # ============================================
  # Celery Worker per task asincroni
  # ============================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatturamvp_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app:ro
      - uploads_data:/app/data/uploads
      - invoices_data:/app/data/invoices
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # Celery Beat per task periodici
  # ============================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatturamvp_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app:ro
      - celerybeat_data:/app/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat --loglevel=info --scheduler celery_scheduler_sqlalchemy.models:DatabaseScheduler

  # ============================================
  # Flower per monitoring Celery
  # ============================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fatturamvp_flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${REDIS_URL}
      - CELERY_RESULT_BACKEND=${REDIS_URL}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    command: celery -A app.celery_app flower --port=5555 --basic-auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-change_me}

  # ============================================
  # Frontend React con Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fatturamvp_frontend
    restart: unless-stopped
    volumes:
      - ./docker/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Nginx Reverse Proxy (opzionale, per SSL)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: fatturamvp_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - backend
      - frontend
    profiles:
      - ssl

# ============================================
# Volumi persistenti
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  invoices_data:
    driver: local
  celerybeat_data:
    driver: local

networks:
  default:
    name: fatturamvp_network
    driver: bridge
